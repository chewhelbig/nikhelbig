<header class="site-header">
  <div class="header-inner">
    <a href="{{ .Site.BaseURL }}" class="site-title">The Psychotherapist</a>
    <p class="site-subtitle">Dr. Nicole Chew-Helbig, PhD</p>
    <nav class="site-nav">
      <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
      <ul class="nav-list">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL | absURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
